# OpenRouter provider configuration for Codex CLI
# Place this at: ~/.config/opencode/config.toml

[provider.openrouter]
name = "openrouter"
api_key = "${OPENROUTER_API_KEY}"

[provider.openrouter.model]
default = "anthropic/claude-sonnet-4-5"

# Optional: model mappings
[provider.openrouter.model.alias]
claude-opus = "anthropic/claude-opus-4"
claude-sonnet = "anthropic/claude-sonnet-4"
claude-haiku = "anthropic/claude-haiku-4"

# Endpoint (default: https://openrouter.ai/api/v1)
# endpoint = "https://openrouter.ai/api/v1"

# Optional: request timeout in seconds
# timeout = 120

# Optional: max tokens
# max_tokens = 8192